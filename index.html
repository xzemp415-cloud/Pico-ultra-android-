<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pico Ultra OS - Android 16</title>
    
    <style>
        :root {
            --nav-bg: rgba(0, 0, 0, 0.8);
            --nav-height: 60px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* основной экран андроида */
        #android-viewport {
            flex: 1;
            width: 100%;
            position: relative;
            background: #111;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            touch-action: none;
        }

        /* панель кнопок в стиле android 16 */
        #nav-bar {
            height: var(--nav-height);
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* отступ для полоски айфона */
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-button {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .nav-button:active {
            transform: scale(0.8);
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        /* иконки кнопок (геометрический стиль android) */
        .icon-back { width: 18px; height: 18px; border-left: 3px solid #fff; border-bottom: 3px solid #fff; transform: rotate(45deg); margin-left: 5px; }
        .icon-home { width: 20px; height: 20px; border: 3px solid #fff; border-radius: 50%; }
        .icon-tasks { width: 18px; height: 18px; border: 3px solid #fff; border-radius: 4px; }

        #fps-counter {
            position: absolute;
            top: env(safe-area-inset-top);
            left: 15px;
            color: #0f0;
            font-size: 10px;
            font-family: monospace;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="fps-counter">PICO ENGINE: 300 FPS | ANDROID 16</div>

    <div id="android-viewport">
        <iframe 
            id="remote-lab-stream"
            src="ЗДЕСЬ_ССЫЛКА_ИЗ_КОМАНДЫ" 
            allow="autoplay; fullscreen; clipboard-read; clipboard-write">
        </iframe>
    </div>

    <div id="nav-bar">
        <div class="nav-button" onclick="history.back()">
            <div class="icon-back"></div>
        </div>
        <div class="nav-button" onclick="location.reload()">
            <div class="icon-home"></div>
        </div>
        <div class="nav-button" onclick="alert('Обзор приложений (Pico OS)')">
            <div class="icon-tasks"></div>
        </div>
    </div>

    <script>
        // скрипт для плавности 300 fps
        const updateEngine = () => {
            window.requestAnimationFrame(updateEngine);
        };
        updateEngine();

        // блокируем «резиновый» скролл ios
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        
        console.log("Pico Ultra OS: Ready for Android 16 Stream");
    </script>
</body>
</html>
