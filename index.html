<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СуперСемён VPN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/1XPVmYfZ/image.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <header>
            <img src="https://i.postimg.cc/1XPVmYfZ/image.jpg" alt="СуперСемён" class="app-logo">
            <h1>СуперСемён</h1>
            <p class="status">Готов к защите</p>
        </header>

        <main>
            <div class="power-button-container">
                <button id="connectBtn" class="power-button">
                    <span class="icon">🔒</span>
                </button>
            </div>

            <div class="location-selector">
                <label for="country">Выберите страну (20 доступно):</label>
                <select id="country">
                    <option value="nl">Нидерланды (Fast)</option>
                    <option value="de">Германия</option>
                    <option value="us">США</option>
                    <option value="sg">Сингапур</option>
                    </select>
            </div>
        </main>

        <footer>
            <p>Мощный обход блокировок. Без рекламы.</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // Регистрация Service Worker для PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
              .then(() => console.log('Service Worker зарегистрирован'));
        }
    </script>
</body>
</html>
