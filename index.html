<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pico Ultra OS</title>
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: -apple-system, sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* экран ожидания */
        #boot-screen {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            text-align: center;
        }

        .pico-logo {
            width: 120px; height: 120px;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .status-text {
            color: #0f0; font-family: monospace; font-size: 14px;
        }

        /* контейнер для реального андроида (скрыт пока нет ссылки) */
        #android-frame {
            display: none; width: 100%; height: 100%; border: none;
        }

        /* кнопки навигации */
        #nav-bar {
            height: 70px; background: rgba(20, 20, 20, 0.95);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid #333;
        }

        .btn {
            width: 50px; height: 50px; display: flex; 
            justify-content: center; align-items: center;
            filter: grayscale(1); opacity: 0.5;
        }
        
        .active-btn { filter: grayscale(0); opacity: 1; }

        .circle { width: 18px; height: 18px; border: 2px solid #fff; border-radius: 50%; }
        .square { width: 16px; height: 16px; border: 2px solid #fff; border-radius: 3px; }
        .arrow { width: 12px; height: 12px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(45deg); }
    </style>
</head>
<body>

    <div id="boot-screen">
        <img src="https://i.ibb.co/d0tphs8s/IMG-4728.webp" class="pico-logo" alt="Pico Logo">
        <div id="log" class="status-text">SYSTEM: STANDBY...</div>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Ожидание потока Android 16 (Samsung S26U)</p>
    </div>

    <iframe id="android-frame" src=""></iframe>

    <div id="nav-bar">
        <div class="btn"><div class="arrow"></div></div>
        <div class="btn active-btn"><div class="circle"></div></div>
        <div class="btn"><div class="square"></div></div>
    </div>

    <script>
        const streamUrl = ""; // ЗАВТРА ВСТАВИШЬ ССЫЛКУ СЮДА

        const logElement = document.getElementById('log');
        const frame = document.getElementById('android-frame');
        const boot = document.getElementById('boot-screen');

        if (streamUrl !== "") {
            boot.style.display = 'none';
            frame.style.display = 'block';
            frame.src = streamUrl;
        } else {
            // имитация работы системы
            const messages = [
                "CHECKING KERNEL...",
                "PICO ENGINE START...",
                "WAITING FOR REMOTE LAB...",
                "READY TO CONNECT 🚀"
            ];
            let i = 0;
            setInterval(() => {
                logElement.innerText = "SYSTEM: " + messages[i % messages.length];
                i++;
            }, 2000);
        }
    </script>
</body>
</html>
