<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крокодил PWA</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Крокодил">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/QMLqK7xr/IMG-4794.jpg">
    
    <style>
        body {
            background-color: #0a0f0a; /* Тёмно-зеленый подвал */
            color: #00ff41; /* Цвет хакерского крокодила */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #console {
            flex-grow: 1;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #00ff41;
            padding: 15px;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            margin-bottom: 20px;
        }
        .line { margin-bottom: 5px; }
        .sip-command { color: #ccff00; font-weight: bold; }
        .system-msg { color: #ffffff; opacity: 0.8; }
        
        #input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex-grow: 1;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 15px;
            font-size: 16px;
            border-radius: 5px;
            outline: none;
        }
        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .icon-preview {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid #00ff41;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <img src="https://i.postimg.cc/QMLqK7xr/IMG-4794.jpg" class="icon-preview" alt="Icon">
    <div style="font-weight: bold; margin-bottom: 10px;">PICO_TERMINAL: CROCODILE_V1</div>

    <div id="console">
        <div class="line system-msg">[SYSTEM] База Pico Corporation восстановлена.</div>
        <div class="line system-msg">[SYSTEM] Карта "Крокодил" активирована в слоте iPhone X.</div>
        <div class="line system-msg">[SYSTEM] Ожидание SIP-команд от Admin_Semyon...</div>
    </div>

    <div id="input-area">
        <input type="text" id="sipInput" placeholder="Введите SIP команду..." onkeypress="if(event.key === 'Enter') runSip()">
        <button onclick="runSip()">RUN</button>
    </div>

    <script>
        function runSip() {
            const input = document.getElementById('sipInput');
            const consoleBox = document.getElementById('console');
            const cmd = input.value.trim();
            
            if (cmd === "") return;

            // Добавляем команду в лог
            const cmdLine = document.createElement('div');
            cmdLine.className = 'line';
            cmdLine.innerHTML = `<span class="sip-command">> (SIP.Execute: ${cmd})</span>`;
            consoleBox.appendChild(cmdLine);

            // Рандомный ответ системы (имитация работы SIP)
            setTimeout(() => {
                const responseLine = document.createElement('div');
                responseLine.className = 'line system-msg';
                const responses = [
                    "[SUCCESS] Импульс Крокодила прошел сквозь плитку.",
                    "[ACTION] Мутант-Профессор получил критический урон.",
                    "[DATA] Файл semyon.fit защищен слоем чешуи.",
                    "[ENGINE] Починенный мотор iPhone X выдал 999% мощности.",
                    "[SHIELD] Неоновые щиты развернуты на 360 градусов."
                ];
                responseLine.innerText = responses[Math.floor(Math.random() * responses.length)];
                consoleBox.appendChild(responseLine);
                consoleBox.scrollTop = consoleBox.scrollHeight;
            }, 500);

            input.value = "";
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }
    </script>
</body>
</html>
