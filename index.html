<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;

            justify-content: center;

<body>

    <div class="loader">

    <script>

        window.location.href = "https://gemini.google.com/";
    </script>
